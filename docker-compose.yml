version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres-db2d
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: prashant
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: todo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
